version: "3.9"

services:
  livekit:
    image: livekit/livekit-server:v1.8.3
    command: --config /etc/livekit.yaml --dev
    ports:
      - "7880:7880"
      - "7881:7881/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: algo
      POSTGRES_PASSWORD: algo
      POSTGRES_DB: algo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algo -d algo"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
